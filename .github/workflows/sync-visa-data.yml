name: Monthly Visa Data Sync

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: scraper/go.mod
          cache-dependency-path: scraper/go.sum

      - name: Run Go Scraper
        run: |
          mkdir -p src/data
          cd scraper
          go run .
          mv passport-index.json ../src/data/passport-index.json

      - name: Check for Data Variations
        id: git-check
        run: |
          git diff --exit-code src/data/passport-index.json || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and Push Updates to Main Branch
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "Visa Tracker Sync Bot"
          git config --global user.email "actions@github.com"
          git add src/data/passport-index.json
          git commit -m "chore: automated monthly global visa dataset refresh"
          git push
